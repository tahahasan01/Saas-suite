name: business-os

services:
  postgres:
    # pgvector image = Postgres 16 with the vector extension preinstalled
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-businessos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-businessos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-businessos} -d ${POSTGRES_DB:-businessos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Dev mail catcher. Accepts every message on 1025 and shows it at
  # http://localhost:8025 instead of delivering it — so password resets,
  # invites and verification links are clickable in dev without credentials,
  # and without any chance of mailing a real person from a test workspace.
  #
  # Not for production: swap EMAIL_PROVIDER/SMTP_* to a real provider there.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP — what the API talks to
      - "${MAILPIT_UI_PORT:-8025}:8025" # web UI — where you read the mail
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      # The image is distroless — no shell, no curl. Mailpit ships its own
      # healthcheck subcommand for exactly this.
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
