name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  api:
    name: API (import + migrate against Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: businessos
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: businessos
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U businessos" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://businessos:devpassword@localhost:5432/businessos
      APP_DATABASE_URL: postgres://app_user:app_user_pw@localhost:5432/businessos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: services/api
        run: |
          python -m pip install -r requirements.txt
          python -m scripts.migrate
          python -m scripts.seed
          python -c "import app.main; print('API imports OK')"
